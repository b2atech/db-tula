<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#4f46e5"/>

  <!-- Center stem -->
  <line x1="32" y1="13" x2="32" y2="51" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Balance arm — slightly tilted (drift = out of balance) -->
  <line x1="12" y1="21" x2="52" y2="27" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Pivot dot -->
  <circle cx="32" cy="21" r="3.5" fill="white"/>

  <!-- Left pan string -->
  <line x1="12" y1="21" x2="12" y2="30" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Left pan -->
  <path d="M5 37 Q12 43 19 37" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Right pan string -->
  <line x1="52" y1="27" x2="52" y2="34" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Right pan (lower = heavier = drift on prod side) -->
  <path d="M45 43 Q52 49 59 43" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Base -->
  <line x1="27" y1="51" x2="37" y2="51" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
