server {
    listen 80;
    server_name dbtula.dgtula.com;

    # Redirect to HTTPS (uncomment after certbot setup)
    # return 301 https://$host$request_uri;

    # React static files
    root /var/www/dbtula-web;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass         http://localhost:5275/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # SignalR WebSocket
    location /hubs/ {
        proxy_pass         http://localhost:5275/hubs/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # React Router — fallback to index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
